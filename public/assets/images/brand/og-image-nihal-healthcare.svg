<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <!-- Background gradient: deep navy to teal -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628;stop-opacity:1" />
      <stop offset="60%" style="stop-color:#0d2240;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0e3a5e;stop-opacity:1" />
    </linearGradient>
    <!-- Accent gradient: teal/cyan -->
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00b4d8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0096c7;stop-opacity:1" />
    </linearGradient>
    <!-- Card gradient -->
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.06" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0.02" />
    </linearGradient>
    <!-- Shield gradient -->
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00b4d8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0077b6;stop-opacity:1" />
    </linearGradient>
    <!-- Clip path for rounded rect -->
    <clipPath id="roundedClip">
      <rect width="1200" height="630" rx="0" ry="0"/>
    </clipPath>
    <filter id="softShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
    <filter id="glowBlue" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="12" flood-color="#00b4d8" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Decorative circles (subtle) -->
  <circle cx="1050" cy="80" r="180" fill="none" stroke="#00b4d8" stroke-width="1" stroke-opacity="0.12"/>
  <circle cx="1050" cy="80" r="120" fill="none" stroke="#00b4d8" stroke-width="1" stroke-opacity="0.1"/>
  <circle cx="150" cy="560" r="200" fill="none" stroke="#0096c7" stroke-width="1" stroke-opacity="0.1"/>
  <circle cx="150" cy="560" r="130" fill="none" stroke="#0096c7" stroke-width="1" stroke-opacity="0.08"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1200" height="5" fill="url(#accentGrad)"/>

  <!-- Main card (frosted glass style) -->
  <rect x="60" y="50" width="1080" height="530" rx="20" ry="20" fill="url(#cardGrad)" stroke="#00b4d8" stroke-width="1" stroke-opacity="0.2"/>

  <!-- Left accent column -->
  <rect x="60" y="50" width="6" height="530" rx="3" ry="3" fill="url(#accentGrad)"/>

  <!-- === LOGO AREA === -->
  <!-- Shield icon (medical cross style) -->
  <g transform="translate(110, 130)" filter="url(#glowBlue)">
    <!-- Shield shape -->
    <path d="M40,0 L80,15 L80,50 Q80,80 40,95 Q0,80 0,50 L0,15 Z" fill="url(#shieldGrad)" opacity="0.95"/>
    <!-- Medical cross inside shield -->
    <rect x="33" y="25" width="14" height="45" rx="3" fill="white" opacity="0.95"/>
    <rect x="18" y="38" width="44" height="14" rx="3" fill="white" opacity="0.95"/>
  </g>

  <!-- Company name -->
  <text x="220" y="185" font-family="'Segoe UI', Arial, sans-serif" font-size="52" font-weight="700" fill="white" letter-spacing="-1">Nihal</text>
  <text x="340" y="185" font-family="'Segoe UI', Arial, sans-serif" font-size="52" font-weight="300" fill="#00b4d8" letter-spacing="-1"> Healthcare</text>

  <!-- Tagline -->
  <text x="220" y="218" font-family="'Segoe UI', Arial, sans-serif" font-size="16" font-weight="400" fill="#7ecfe0" letter-spacing="3">STERILE MEDICAL DEVICES</text>

  <!-- Divider line -->
  <line x1="110" y1="255" x2="1090" y2="255" stroke="#00b4d8" stroke-width="1" stroke-opacity="0.25"/>

  <!-- === MAIN HEADLINE === -->
  <text x="110" y="320" font-family="'Segoe UI', Arial, sans-serif" font-size="42" font-weight="700" fill="white">Precision. Purity. Performance.</text>
  <text x="110" y="375" font-family="'Segoe UI', Arial, sans-serif" font-size="22" font-weight="300" fill="#a8d8ea">ISO 13485 Certified Manufacturer of Sterile Syringes</text>
  <text x="110" y="407" font-family="'Segoe UI', Arial, sans-serif" font-size="22" font-weight="300" fill="#a8d8ea">&#38; Hypodermic Needles — Made in India</text>

  <!-- === TRUST BADGES (bottom row) === -->
  <!-- Badge 1: ISO -->
  <g transform="translate(110, 450)">
    <rect width="180" height="80" rx="12" fill="#ffffff" fill-opacity="0.08" stroke="#00b4d8" stroke-width="1" stroke-opacity="0.4"/>
    <text x="90" y="30" font-family="'Segoe UI', Arial, sans-serif" font-size="20" font-weight="700" fill="#00b4d8" text-anchor="middle">ISO 13485</text>
    <text x="90" y="55" font-family="'Segoe UI', Arial, sans-serif" font-size="13" font-weight="400" fill="#a8d8ea" text-anchor="middle">Certified QMS</text>
  </g>

  <!-- Badge 2: ETO -->
  <g transform="translate(310, 450)">
    <rect width="180" height="80" rx="12" fill="#ffffff" fill-opacity="0.08" stroke="#00b4d8" stroke-width="1" stroke-opacity="0.4"/>
    <text x="90" y="30" font-family="'Segoe UI', Arial, sans-serif" font-size="20" font-weight="700" fill="#00b4d8" text-anchor="middle">ETO Sterilized</text>
    <text x="90" y="55" font-family="'Segoe UI', Arial, sans-serif" font-size="13" font-weight="400" fill="#a8d8ea" text-anchor="middle">Assured Sterility</text>
  </g>

  <!-- Badge 3: CE -->
  <g transform="translate(510, 450)">
    <rect width="180" height="80" rx="12" fill="#ffffff" fill-opacity="0.08" stroke="#00b4d8" stroke-width="1" stroke-opacity="0.4"/>
    <text x="90" y="30" font-family="'Segoe UI', Arial, sans-serif" font-size="20" font-weight="700" fill="#00b4d8" text-anchor="middle">CE Marked</text>
    <text x="90" y="55" font-family="'Segoe UI', Arial, sans-serif" font-size="13" font-weight="400" fill="#a8d8ea" text-anchor="middle">EU Compliant</text>
  </g>

  <!-- Badge 4: Bulk Orders -->
  <g transform="translate(710, 450)">
    <rect width="180" height="80" rx="12" fill="#ffffff" fill-opacity="0.08" stroke="#00b4d8" stroke-width="1" stroke-opacity="0.4"/>
    <text x="90" y="30" font-family="'Segoe UI', Arial, sans-serif" font-size="20" font-weight="700" fill="#00b4d8" text-anchor="middle">Bulk Orders</text>
    <text x="90" y="55" font-family="'Segoe UI', Arial, sans-serif" font-size="13" font-weight="400" fill="#a8d8ea" text-anchor="middle">Global Supply</text>
  </g>

  <!-- Website URL (bottom right) -->
  <text x="1090" y="560" font-family="'Segoe UI', Arial, sans-serif" font-size="16" font-weight="400" fill="#7ecfe0" text-anchor="end" opacity="0.8">nihalhealthcare.com</text>

  <!-- Bottom accent bar -->
  <rect x="0" y="625" width="1200" height="5" fill="url(#accentGrad)"/>
</svg>
